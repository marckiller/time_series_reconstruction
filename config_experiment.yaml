compute_metrics:
  input_path: data/real/dataset.parquet
  output_path: results/metrics_report.json
  ts_keep_probs: [0.1, 0.5, 0.9]
  index_keep_probs: [0.1, 0.5, 0.9]
  metrics:
    - mse
    - mae
    - r2
  model_path: models/conv_reconstruction_model.pt
  model:
    class_name: ConvReconstructionModel
    module: src.models.conv_reconstruction_model
  date_range:
    use_date_range: true
    start: '2020-01-01'
    end: '2024-12-31'
  n_samples: 400
  random_seed: 42
  mask_config:
      ts_keep_prob: 0.2       #strong masking X_ts
      index_keep_prob: 0.5     #medium masking X_index
      static_p: 0.3          # weak masking X_static


